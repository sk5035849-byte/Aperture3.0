<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

   Get these from: Supabase dashboard → Project Settings → API.
   See the setup checklist that appears on screen if this isn't filled in yet.
   ========================================================================= */
const SUPABASE_URL = "https://fvkhhchvorrkmagmlkaa.supabase.co
const SUPABASE_ANON_KEY = "sb_publishable_ABsjroKljiLhqkEneDFQBQ_LthPFlN0";

const CHALLENGE = {
  tag: 'golden-hour',
  title: 'This week: Golden Hour',
  description: 'Submit your best shot taken during golden hour — that magic light right after sunrise or before sunset. Top-liked entry gets featured all week.',
};

/* ---------------- setup guard ---------------- */

const needsSetup = SUPABASE_URL.startsWith('PASTE_YOUR_') || SUPABASE_ANON_KEY.startsWith('PASTE_YOUR_');

if (needsSetup) {
  document.getElementById('app').innerHTML = `
    <div class="setup-wrap">
      <h1 class="font-display">One quick setup step</h1>
      <p style="color:rgba(242,237,228,0.6)">This file needs a free Supabase project to store accounts and photos for real, shared, live use. Takes about 10 minutes, no credit card.</p>
      <ol>
        <li>Go to <strong>supabase.com</strong> → Start your project → New project (any name, any region) → wait ~2 min for it to provision.</li>
        <li>Go to <strong>Authentication → Providers → Email</strong> → turn <strong>OFF</strong> "Confirm email" (so sign-up logs people in immediately, matching this app's flow).</li>
        <li>Go to <strong>SQL Editor</strong> → paste the schema + policies SQL from <code>SUPABASE_SETUP.md</code> → Run.</li>
        <li>Go to <strong>Storage</strong> → Create a new bucket named exactly <code>photos</code> → toggle <strong>Public bucket</strong> ON.</li>
        <li>Go to <strong>Storage → Policies</strong> → paste the storage policies SQL from <code>SUPABASE_SETUP.md</code> in the SQL Editor (same place as step 3 works fine too) → Run.</li>
        <li>Go to <strong>Project Settings → API</strong> → copy the <strong>Project URL</strong> and the <strong>anon public</strong> key.</li>
        <li>Paste those two values into this file, near the top of the <code>&lt;script&gt;</code> section, replacing the <code>PASTE_YOUR_...</code> placeholders.</li>
      </ol>
      <p style="color:rgba(242,237,228,0.6)">Once that's done, reload this page (or re-upload it if it's already live on GitHub Pages) — it'll work for real, for anyone who opens the link.</p>
    </div>
  `;

}

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= app state ================= */

let currentUser = null;      // { id, username, full_name, email, bio, is_admin, saved_photo_ids }
let authReady = false;
let authMode = 'signup';
let authError = '';

let route = 'feed';

let pageData = null;

let chatMessages = null;
let chatDraft = '';

/* ================= helpers ================= */

function timeAgo(iso){
  const diff = (Date.now() - new Date(iso).getTime())/1000;
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function showToast(msg){
  toastMessage = msg;
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastMessage = ''; render(); }, 3200);
}

function friendlyAuthError(err){
  const msg = (err && err.message) || 'Something went wrong. Please try again.';
  if(/already registered/i.test(msg)) return 'That email is already registered — try signing in instead.';
  if(/invalid login credentials/i.test(msg)) return 'Incorrect email or password.';
  if(/password should be/i.test(msg)) return msg;
  if(/rate limit/i.test(msg)) return 'Too many attempts — please wait a moment and try again.';
  if(/email not confirmed/i.test(msg)) return 'Please confirm your email, or ask the site owner to disable "Confirm email" in Supabase Auth settings.';
  return msg;
}

function icon(name, cls, filled){
  const s = 'width="18" height="18" viewBox="0 0 24 24" fill="' + (filled?'currentColor':'none') + '" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"';
  const paths = {

function verifiedBadgeHtml(p){

function avatarHtml(user, size){

/* ================= data layer (Supabase) ================= */

async function loadProfile(uid){
  const { data, error } = await supabase.from('profiles').select('*').eq('id', uid).single();
  if(error) { console.error(error); return null; }
  return data;
}

async function fetchViewerReactions(uid){
  const map = new Map();
  if(!uid) return map;
  const { data, error } = await supabase.from('reactions').select('photo_id,type').eq('user_id', uid);
  if(error) { console.error(error); return map; }
  data.forEach(r => map.set(r.photo_id, r.type));
  return map;
}

function attachReactions(photos, reactionMap){
  return photos.map(p => ({ ...p, viewer_reaction: reactionMap.get(p.id) || null }));
}

async function fetchFeed(){
  if(feedMode === 'following' && currentUser){
    const { data: followRows, error: followError } = await supabase.from('follows').select('following_id').eq('follower_id', currentUser.id);
    if(followError) return { error: followError.message };
    const followingIds = followRows.map(r => r.following_id);
    if(followingIds.length === 0) return { photos: [], emptyFollowing: true };
    const { data, error } = await supabase.from('photos').select('*').in('author_id', followingIds).order('created_at', { ascending:false }).limit(100);
    if(error) return { error: error.message };
    const reactions = await fetchViewerReactions(currentUser.id);
    return { photos: attachReactions(data, reactions) };
  }
  const { data, error } = await supabase.from('photos').select('*').order('created_at', { ascending:false }).limit(100);
  if(error) return { error: error.message };
  const reactions = await fetchViewerReactions(currentUser && currentUser.id);
  return { photos: attachReactions(data, reactions) };
}

async function fetchExplore(){
  const { data, error } = await supabase.from('photos').select('*').order('likes_count', { ascending:false }).limit(150);
  if(error) return { error: error.message };
  let photos = data;
  const allCameras = [...new Set(data.map(p => p.camera).filter(Boolean))].sort();
  if(exploreVerifiedOnly) photos = photos.filter(p => p.has_camera_exif && p.attested_original);
  if(exploreCameraFilter) photos = photos.filter(p => p.camera === exploreCameraFilter);
  const reactions = await fetchViewerReactions(currentUser && currentUser.id);
  return { photos: attachReactions(photos, reactions), allCameras };
}

async function fetchTrending(){
  const { data, error } = await supabase.from('photos').select('*').order('likes_count', { ascending:false }).limit(150);
  if(error) return { error: error.message };
  const startOfToday = new Date(); startOfToday.setHours(0,0,0,0);
  const today = data.filter(p => new Date(p.created_at) >= startOfToday);
  const reactions = await fetchViewerReactions(currentUser && currentUser.id);
  return { photos: attachReactions(today, reactions) };
}

async function fetchChallenge(){
  const { data, error } = await supabase.from('photos').select('*').eq('challenge_tag', CHALLENGE.tag);
  if(error) return { error: error.message };
  const photos = [...data].sort((a,b)=>b.likes_count - a.likes_count);
  const reactions = await fetchViewerReactions(currentUser && currentUser.id);
  return { photos: attachReactions(photos, reactions) };
}

async function fetchProfile(username){
  const { data: user, error: userError } = await supabase.from('profiles').select('*').eq('username', username).single();
  if(userError || !user) return { notFound: true };
  const { data: photosData, error: photosError } = await supabase.from('photos').select('*').eq('author_id', user.id);
  if(photosError) return { error: photosError.message };
  const photos = [...photosData].sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));

  let savedPhotos = [];
  const isOwn = currentUser && currentUser.id === user.id;
  if(isOwn && user.saved_photo_ids && user.saved_photo_ids.length){
    const { data: saved } = await supabase.from('photos').select('*').in('id', user.saved_photo_ids);
    savedPhotos = saved || [];
  }

  const { count: followerCount } = await supabase.from('follows').select('*', { count:'exact', head:true }).eq('following_id', user.id);
  const { count: followingCount } = await supabase.from('follows').select('*', { count:'exact', head:true }).eq('follower_id', user.id);
  let isFollowing = false;
  if(currentUser && !isOwn){
    const { data: followRow } = await supabase.from('follows').select('follower_id').eq('follower_id', currentUser.id).eq('following_id', user.id).maybeSingle();
    isFollowing = Boolean(followRow);
  }

  return { user, photos, savedPhotos, isOwn, followerCount: followerCount||0, followingCount: followingCount||0, isFollowing };
}

async function fetchAdmin(){
  const { data: reports, error } = await supabase.from('reports').select('*');
  if(error) return { error: error.message };
  const photoIds = [...new Set(reports.map(r => r.photo_id))];
  if(photoIds.length === 0) return { groups: [] };
  const { data: photos } = await supabase.from('photos').select('*').in('id', photoIds);
  const photoMap = new Map((photos||[]).map(p => [p.id, p]));
  const groups = new Map();
  reports.forEach(r => {
    const photo = photoMap.get(r.photo_id);
    if(!photo) return; // already deleted
    if(!groups.has(r.photo_id)) groups.set(r.photo_id, { photo, reports: [] });
    groups.get(r.photo_id).reports.push(r);
  });
  return { groups: [...groups.values()] };
}

async function loadPageData(){
  pageData = null; render();
  try {
    if(route === 'feed') pageData = await fetchFeed();
    else if(route === 'explore') pageData = await fetchExplore();
    else if(route === 'trending') pageData = await fetchTrending();
    else if(route === 'challenge') pageData = await fetchChallenge();
    else if(route === 'chat') pageData = chatView === 'list' ? await fetchConversations() : null;
    else if(route === 'profile') pageData = await fetchProfile(viewedUsername || currentUser.username);
    else if(route === 'admin') pageData = currentUser.is_admin ? await fetchAdmin() : { forbidden: true };
  } catch(err){
    console.error(err);
    pageData = { error: err.message };
  }
  render();
}

/* ================= auth ================= */

async function initAuth(){
  const { data: { session } } = await supabase.auth.getSession();
  currentUser = session && session.user ? await loadProfile(session.user.id) : null;
  authReady = true;
  render();
  if(currentUser) loadPageData();

  supabase.auth.onAuthStateChange(async (_event, session) => {
    currentUser = session && session.user ? await loadProfile(session.user.id) : null;
    render();
    if(currentUser) loadPageData();
  });
}

function setAuthMode(mode){ authMode = mode; authError=''; render(); }

async function handleAuthSubmit(e){
  e.preventDefault();
  const f = e.target;
  authError = '';
  authBusy = true;
  render();

  try {
    if(authMode === 'signup'){
      const username = f.username.value.trim();
      const full_name = f.full_name.value.trim();
      const email = f.email.value.trim();
      const password = f.password.value;

      if(!/^[a-zA-Z0-9_.]{3,20}$/.test(username)){
        authError = 'Username must be 3-20 characters: letters, numbers, underscore, or dot.';
        authBusy = false; render(); return;
      }

      const { data: clash } = await supabase.from('profiles').select('id').eq('username', username).limit(1);
      if(clash && clash.length){
        authError = 'That username is already taken.';
        authBusy = false; render(); return;
      }

      const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
      if(signUpError) throw signUpError;
      if(!signUpData.session){
        authError = 'Check your email to confirm your account, then sign in. (Or ask the site owner to disable "Confirm email" in Supabase for instant signup.)';
        authBusy = false; render(); return;
      }

      const { count } = await supabase.from('profiles').select('*', { count:'exact', head:true });
      const isFirstUser = !count;

      const profile = { id: signUpData.user.id, username, full_name: full_name || username, bio:'', is_admin: isFirstUser, saved_photo_ids: [] };
      const { error: insertError } = await supabase.from('profiles').insert(profile);
      if(insertError) throw insertError;

      currentUser = profile;
      if(isFirstUser) showToast("You're the first user, so you've been made an admin.");
    } else {
      const email = f.email.value.trim();
      const password = f.password.value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if(error) throw error;
      currentUser = await loadProfile(data.user.id);
    }
    route = 'feed';
    authBusy = false;
    render();
    loadPageData();
  } catch(err){
    authError = friendlyAuthError(err);
    authBusy = false;
    render();
  }
}

async function logout(){
  await supabase.auth.signOut();
  currentUser = null;
  authMode = 'login';
  route = 'feed';
  render();
}

function renderAuth(){
  if(!authReady){
    return `<div class="auth-wrap"><p style="color:rgba(242,237,228,0.5)">Loading…</p></div>`;
  }
  return `
    <div class="auth-wrap">
      <div class="auth-box">
        <div class="auth-logo">
          <svg width="44" height="44" viewBox="0 0 26 26" fill="none">
            <circle cx="13" cy="13" r="12" stroke="#e8a33d" stroke-width="1.5"/>
            <path d="M13 4 L13 13 L20 17" stroke="#e8a33d" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="13" cy="13" r="3" fill="#c2493f"/>
          </svg>
          <h1 class="font-display">Aperture</h1>
          <p>Where photographers share their best work.</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab ${authMode==='signup'?'active':''}" onclick="setAuthMode('signup')">Create account</button>
          <button class="auth-tab ${authMode==='login'?'active':''}" onclick="setAuthMode('login')">Sign in</button>
        </div>

        <form onsubmit="handleAuthSubmit(event)">
          ${authMode==='signup' ? `
            <input class="auth-field" name="username" placeholder="Username" required />
            <input class="auth-field" name="full_name" placeholder="Full name (optional)" />
            <input class="auth-field" name="email" type="email" placeholder="Email" required />
            <input class="auth-field" name="password" type="password" placeholder="Password (6+ characters)" required />
          ` : `
            <input class="auth-field" name="email" type="email" placeholder="Email" required />
            <input class="auth-field" name="password" type="password" placeholder="Password" required />
          `}
          ${authError ? `<p class="auth-error">${authError}</p>` : ''}
          <button type="submit" class="auth-submit" ${authBusy?'disabled':''}>${authBusy ? 'Please wait…' : (authMode==='signup' ? 'Create account' : 'Sign in')}</button>
        </form>

        <p class="auth-hint">Real accounts, shared with everyone who opens this page — powered by Supabase. The very first person to sign up becomes an admin automatically.</p>
      </div>
    </div>
  `;
}

/* ================= reactions / saves ================= */

async function react(id, type){
  if(!currentUser) return;
  try {
    const { error } = await supabase.rpc('toggle_reaction', { p_photo_id: id, p_type: type });
    if(error) throw error;
    await loadPageData();
  } catch(err){
    console.error(err);
    showToast('Could not update — please try again.');
  }
}

async function toggleSave(id){
  if(!currentUser) return;
  const saved = currentUser.saved_photo_ids.includes(id);
  const newIds = saved ? currentUser.saved_photo_ids.filter(x=>x!==id) : [...currentUser.saved_photo_ids, id];
  try {
    const { error } = await supabase.from('profiles').update({ saved_photo_ids: newIds }).eq('id', currentUser.id);
    if(error) throw error;
    currentUser.saved_photo_ids = newIds;
    if(!saved) showToast('Saved to your collection');
    if(route === 'profile') loadPageData(); else render();
  } catch(err){
    console.error(err);
    showToast('Could not save — please try again.');
  }
}

async function toggleFollow(targetUserId){
  if(!currentUser || currentUser.id === targetUserId) return;
  try {
    if(pageData.isFollowing){
      const { error } = await supabase.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', targetUserId);
      if(error) throw error;
    } else {
      const { error } = await supabase.from('follows').insert({ follower_id: currentUser.id, following_id: targetUserId });
      if(error) throw error;
    }
    loadPageData();
  } catch(err){
    console.error(err);
    showToast('Could not update follow — please try again.');
  }
}

/* ================= chat ================= */

async function fetchConversations(){
  const { data, error } = await supabase.from('messages')
    .select('*')
    .or(`sender_id.eq.${currentUser.id},recipient_id.eq.${currentUser.id}`)
    .order('created_at', { ascending:false });
  if(error) return { error: error.message };
  const partners = new Map();
  for(const m of data){
    const partnerId = m.sender_id === currentUser.id ? m.recipient_id : m.sender_id;
    if(!partners.has(partnerId)) partners.set(partnerId, m);
  }
  const ids = [...partners.keys()];
  if(ids.length === 0) return { conversations: [] };
  const { data: profiles } = await supabase.from('profiles').select('*').in('id', ids);
  const profileMap = new Map((profiles||[]).map(p=>[p.id,p]));
  const conversations = ids.map(id => ({ partner: profileMap.get(id), lastMessage: partners.get(id) })).filter(c=>c.partner);
  return { conversations };
}

function unsubscribeChat(){
  if(chatChannel){ supabase.removeChannel(chatChannel); chatChannel = null; }
}

function subscribeChat(){
  unsubscribeChat();
  chatChannel = supabase.channel(`chat_${[currentUser.id, chatPartner.id].sort().join('_')}`)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload => {
      const m = payload.new;
      const involvesUs = (m.sender_id===currentUser.id && m.recipient_id===chatPartner.id) || (m.sender_id===chatPartner.id && m.recipient_id===currentUser.id);
      if(involvesUs && chatMessages && !chatMessages.find(x=>x.id===m.id)){ chatMessages.push(m); render(); }
    })
    .on('postgres_changes', { event:'DELETE', schema:'public', table:'messages' }, payload => {
      const old = payload.old;
      if(old && chatMessages){ chatMessages = chatMessages.filter(x=>x.id!==old.id); render(); }
    })
    .subscribe();
}

async function loadChatMessages(){
  const { data, error } = await supabase.from('messages').select('*')
    .or(`and(sender_id.eq.${currentUser.id},recipient_id.eq.${chatPartner.id}),and(sender_id.eq.${chatPartner.id},recipient_id.eq.${currentUser.id})`)
    .order('created_at', { ascending:true });
  if(error){ console.error(error); chatMessages = []; render(); return; }
  chatMessages = data;
  render();
}

async function openChatWith(userId){
  unsubscribeChat();
  route = 'chat';
  chatView = 'thread';
  chatMessages = null;
  chatDraft = '';
  const { data: partner } = await supabase.from('profiles').select('*').eq('id', userId).single();
  chatPartner = partner;
  render();
  await loadChatMessages();
  subscribeChat();
}

function closeChatThread(){
  unsubscribeChat();
  chatView = 'list';
  chatPartner = null;
  chatMessages = null;
  loadPageData();
}

function updateChatDraft(v){ chatDraft = v; }

async function sendChatMessage(){
  const body = chatDraft.trim();
  if(!body || !chatPartner) return;
  chatDraft = '';
  render();
  try {
    const { data, error } = await supabase.from('messages')
      .insert({ sender_id: currentUser.id, recipient_id: chatPartner.id, body })
      .select().single();
    if(error) throw error;
    if(chatMessages && !chatMessages.find(x=>x.id===data.id)){ chatMessages.push(data); render(); }
  } catch(err){
    console.error(err);
    showToast('Could not send — please try again.');
  }
}

async function deleteChatMessage(id){
  try {
    const { error } = await supabase.from('messages').delete().eq('id', id);
    if(error) throw error;
    if(chatMessages) chatMessages = chatMessages.filter(m=>m.id!==id);
    render();
  } catch(err){
    console.error(err);
    showToast('Could not delete — please try again.');
  }
}

function renderChat(){
  if(chatView === 'thread') return renderChatThread();
  if(!pageData) return loadingHtml();
  if(pageData.error) return `<div class="empty"><p>${pageData.error}</p></div>`;
  const { conversations } = pageData;
  return `
    <h1 class="page-title font-display">Messages</h1>
    ${conversations.length === 0 ? `<div class="empty"><p>No conversations yet. Visit a profile and hit Message to start one.</p></div>` : conversations.map(c => `
      <button class="card-header" style="background:var(--bg-800); border:1px solid var(--bg-700); border-radius:6px; margin-bottom:8px;" onclick="openChatWith('${c.partner.id}')">
        ${avatarHtml(c.partner, 40)}
        <div class="meta" style="flex:1; text-align:left; min-width:0;">
          <p class="name">${c.partner.full_name}</p>
          <p class="handle" style="max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.lastMessage.sender_id===currentUser.id?'You: ':''}${c.lastMessage.body}</p>
        </div>
        <span class="font-mono" style="font-size:11px; color:rgba(242,237,228,0.35); flex-shrink:0;">${timeAgo(c.lastMessage.created_at)}</span>
      </button>
    `).join('')}
  `;
}

function renderChatThread(){
  if(!chatPartner) return loadingHtml();
  return `
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
      <button class="link-btn" onclick="closeChatThread()">← Back</button>
      <button class="card-header" style="padding:0;" onclick="viewProfile('${chatPartner.username}')">
        ${avatarHtml(chatPartner, 32)}
        <div class="meta"><p class="name">${chatPartner.full_name}</p><p class="handle">@${chatPartner.username}</p></div>
      </button>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:14px;">
      ${chatMessages === null ? loadingHtml() : ''}
      ${chatMessages && chatMessages.length === 0 ? `<p style="text-align:center; color:rgba(242,237,228,0.4); padding:20px 0;">Say hello 👋</p>` : ''}
      ${chatMessages ? chatMessages.map(m => `
        <div class="chat-row ${m.sender_id===currentUser.id?'mine':''}">
          ${m.sender_id===currentUser.id ? `<button class="msg-delete" onclick="deleteChatMessage('${m.id}')" title="Delete">${icon('trash')}</button>` : ''}
          <div class="chat-bubble ${m.sender_id===currentUser.id?'mine':''}">${m.body}</div>
        </div>
      `).join('') : ''}
    </div>
    <div style="display:flex; gap:8px; position:sticky; bottom:0; background:var(--bg-950); padding:10px 0;">
      <input class="auth-field" style="margin:0;" placeholder="Type a message…" value="${chatDraft}"
        oninput="updateChatDraft(this.value)"
        onkeydown="if(event.key==='Enter'){ sendChatMessage(); }" />
      <button class="publish-btn" onclick="sendChatMessage()">Send</button>
    </div>
  `;
}

function reactButtons(p){
  const saved = currentUser && currentUser.saved_photo_ids.includes(p.id);
  return `
    <div class="reactions">
      <button class="react-btn ${p.viewer_reaction==='like'?'liked':''}" onclick="react('${p.id}','like')">
        ${icon('heart','', p.viewer_reaction==='like')} ${p.likes_count||0}
      </button>
      <button class="react-btn ${p.viewer_reaction==='dislike'?'disliked':''}" onclick="react('${p.id}','dislike')">
        ${icon('down','', p.viewer_reaction==='dislike')} ${p.dislikes_count||0}
      </button>
      <button class="react-btn ${saved?'saved':''}" onclick="toggleSave('${p.id}')" title="Save to collection">
        ${icon('bookmark','', saved)}
      </button>
    </div>`;
}

function chips(p){
  let out = '<div class="chips">';
  if(p.location) out += `<span class="chip font-mono">📍 ${p.location}</span>`;
  if(p.camera) out += `<span class="chip font-mono">${p.camera}</span>`;
  if(p.lens) out += `<span class="chip font-mono">${p.lens}</span>`;
  if(p.challenge_tag === CHALLENGE.tag) out += `<span class="chip tag-challenge">🏆 Golden Hour Challenge</span>`;
  return out + '</div>';
}

/* ================= feed / explore / trending / challenge ================= */

function loadingHtml(label){ return `<p style="text-align:center; color:rgba(242,237,228,0.4); padding:60px 0;">${label||'Loading…'}</p>`; }

function setFeedMode(mode){ feedMode = mode; loadPageData(); }

function renderFeed(){
  if(!pageData) return loadingHtml();
  if(pageData.error) return `<div class="empty"><p>${pageData.error}</p></div>`;
  const { photos, emptyFollowing } = pageData;

async function saveProfile(e){
  e.preventDefault();
  const f = e.target;
  const full_name = f.full_name.value.trim() || currentUser.username;
  const bio = f.bio.value.trim();
  try {
    const { error } = await supabase.from('profiles').update({ full_name, bio }).eq('id', currentUser.id);
    if(error) throw error;
    currentUser.full_name = full_name;
    currentUser.bio = bio;
    profileEditing = false;
    loadPageData();
  } catch(err){
    console.error(err);
    showToast('Could not save profile — please try again.');
  }
}

async function uploadAvatar(file){
  if(!currentUser || !file) return;
  avatarUploading = true; render();
  try {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${currentUser.id}/avatar.${ext}`;
    const { error: uploadError } = await supabase.storage.from('avatars').upload(path, file, { contentType: file.type, upsert: true });
    if(uploadError) throw uploadError;
    const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(path);
    const avatar_url = `${urlData.publicUrl}?t=${Date.now()}`; // cache-bust so the new avatar shows immediately
    const { error: updateError } = await supabase.from('profiles').update({ avatar_url }).eq('id', currentUser.id);
    if(updateError) throw updateError;
    currentUser.avatar_url = avatar_url;
    avatarUploading = false;
    showToast('Profile photo updated');
    loadPageData();
  } catch(err){
    console.error(err);
    avatarUploading = false;
    showToast('Could not upload photo — please try again.');
    render();
  }
}

async function openConnections(userId, tab){

  connectionsModal.loading = false;

}

function setConnectionsTab(tab){
  if(!connectionsModal) return;
  openConnections(connectionsModal.userId, tab);
}

function closeConnections(){ connectionsModal = null; render(); }

async function fetchConnections(userId, tab){
  const col = tab === 'followers' ? 'following_id' : 'follower_id';
  const wantCol = tab === 'followers' ? 'follower_id' : 'following_id';
  const { data: rows, error } = await supabase.from('follows').select(wantCol).eq(col, userId);
  if(error){ console.error(error); return []; }
  const ids = rows.map(r => r[wantCol]);
  if(ids.length === 0) return [];
  const { data: users } = await supabase.from('profiles').select('*').in('id', ids);
  return users || [];
}

async function adminDismiss(photoId){
  try {
    const { error } = await supabase.from('reports').delete().eq('photo_id', photoId);
    if(error) throw error;
    showToast('Report dismissed');
    loadPageData();
  } catch(err){ console.error(err); showToast('Could not dismiss — please try again.'); }
}

async function adminDeletePhoto(photoId, storagePath){
  if(!confirm('Permanently delete this photo?')) return;
  try {
    await supabase.from('reports').delete().eq('photo_id', photoId);
    const { error } = await supabase.from('photos').delete().eq('id', photoId);
    if(error) throw error;
    if(storagePath && storagePath !== 'undefined') await supabase.storage.from('photos').remove([storagePath]);
    showToast('Photo deleted');
    loadPageData();
  } catch(err){ console.error(err); showToast('Could not delete — please try again.'); }
}

function openPhoto(id){
  activePhoto = (pageData.photos || []).find(p=>p.id===id) || null;

  render();
  if(activePhoto){
    fetchComments(id).then(comments => { activePhotoComments = comments; render(); });

function closeModal(){ activePhoto = null; activePhotoComments = null; render(); }

async function deletePhoto(id){
  if(!confirm('Delete this photo? This cannot be undone.')) return;
  try {
    const photo = pageData.photos.find(p=>p.id===id);
    const { error } = await supabase.from('photos').delete().eq('id', id);
    if(error) throw error;
    if(photo && photo.image_storage_path) await supabase.storage.from('photos').remove([photo.image_storage_path]);
    activePhoto = null;
    loadPageData();
  } catch(err){ console.error(err); showToast('Could not delete — please try again.'); }

async function reportPhoto(id){
  if(!currentUser) return;
  const reason = prompt('Why are you reporting this photo? (e.g. suspected AI-generated, stolen work)');
  if(reason === null) return;
  try {
    const { error } = await supabase.from('reports').upsert({
      photo_id: id, reporter_id: currentUser.id, reporter_username: currentUser.username, reason,
    }, { onConflict: 'photo_id,reporter_id' });
    if(error) throw error;
    showToast('Thanks — this has been reported to the team.');
  } catch(err){ console.error(err); showToast('Could not report — please try again.'); }
}

async function fetchComments(photoId){
  const { data, error } = await supabase.from('comments').select('*').eq('photo_id', photoId).order('created_at', { ascending:true });
  if(error){ console.error(error); return []; }
  return data;
}

function updateCommentDraft(value){ commentDraft = value; }

async function postComment(photoId){
  if(!currentUser) return;
  const body = commentDraft.trim();
  if(!body) return;
  try {
    const { error } = await supabase.from('comments').insert({
      photo_id: photoId, author_id: currentUser.id,
      author_username: currentUser.username, author_full_name: currentUser.full_name,
      body,
    });
    if(error) throw error;
    commentDraft = '';
    activePhotoComments = await fetchComments(photoId);
    render();
  } catch(err){
    console.error(err);
    showToast('Could not post comment — please try again.');
  }
}

async function deleteComment(commentId, photoId){
  if(!confirm('Delete this comment?')) return;
  try {
    const { error } = await supabase.from('comments').delete().eq('id', commentId);
    if(error) throw error;
    activePhotoComments = await fetchComments(photoId);
    render();
  } catch(err){
    console.error(err);
    showToast('Could not delete — please try again.');
  }
}

/* ================= upload ================= */

function openUpload(forChallenge){
  uploadOpen = true;
  uploadItems = [];
  uploadAttested = false;
  uploadForChallenge = Boolean(forChallenge);
  render();
}
function closeUpload(){ uploadOpen = false; render(); }

function scanForExif(buffer){
  const bytes = new Uint8Array(buffer.slice(0, 131072));
  let str = '';
  for(let i=0;i<bytes.length;i++) str += String.fromCharCode(bytes[i]);
  return str.includes('Exif');
}

async function handleFiles(fileList){
  const room = 10 - uploadItems.length;
  const files = Array.from(fileList).filter(f=>f.type.startsWith('image/')).slice(0, room);
  for(const file of files){
    const [dataUrl, buffer] = await Promise.all([
      new Promise((resolve) => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file); }),
      file.arrayBuffer(),
    ]);
    uploadItems.push({ file, previewUrl: dataUrl, caption:'', location:'', camera:'', lens:'', hasCameraExif: scanForExif(buffer) });
    render();
  }
}

function updateUploadField(i, field, value){ uploadItems[i][field] = value; }
function removeUploadItem(i){ uploadItems.splice(i,1); render(); }
function setUploadAttested(checked){ uploadAttested = checked; render(); }
function setUploadForChallenge(checked){ uploadForChallenge = checked; }

async function publish(){
  if(uploadItems.length === 0) return;
  if(!uploadAttested){ showToast('Please confirm the photos are your own original work first.'); return; }
  uploadBusy = true; render();

  try {
    for(const it of uploadItems){
      const ext = (it.file.name.split('.').pop() || 'jpg').toLowerCase();
      const path = `${currentUser.id}/${crypto.randomUUID()}.${ext}`;

      const { error: uploadError } = await supabase.storage.from('photos').upload(path, it.file, { contentType: it.file.type });
      if(uploadError) throw uploadError;

      const { data: urlData } = supabase.storage.from('photos').getPublicUrl(path);

      const { error: insertError } = await supabase.from('photos').insert({
        author_id: currentUser.id,
        author_username: currentUser.username,
        author_full_name: currentUser.full_name,
        image_url: urlData.publicUrl,
        image_storage_path: path,
        caption: it.caption, location: it.location, camera: it.camera, lens: it.lens,
        has_camera_exif: it.hasCameraExif,
        attested_original: true,
        challenge_tag: uploadForChallenge ? CHALLENGE.tag : null,
        license_price: 20 + Math.floor(Math.random()*40),
      });
      if(insertError) throw insertError;
    }
    const wentToChallenge = uploadForChallenge;
    uploadBusy = false;
    closeUpload();
    route = wentToChallenge ? 'challenge' : 'feed';
    loadPageData();
  } catch(err){
    console.error(err);
    uploadBusy = false;
    showToast('Upload failed — please try again.');
    render();
  }
}

  `;
}
